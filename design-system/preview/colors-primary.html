<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="background:#fff;padding:20px;margin:0;font-family:Inter,system-ui;">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
  <div style="display:flex;flex-direction:column;gap:4px;">
    <div style="height:64px;border-radius:12px;background:#1C81EF;display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:10px;font-weight:600;">Primary</div>
    <div style="font-size:11px;color:#252525;font-weight:500;">primary</div>
    <div style="font-size:10px;color:#7C7C7C;font-family:ui-monospace,monospace;">#1C81EF</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;">
    <div style="height:64px;border-radius:12px;background:#4290ED;display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:10px;font-weight:600;">Hover</div>
    <div style="font-size:11px;color:#252525;font-weight:500;">primary-hover</div>
    <div style="font-size:10px;color:#7C7C7C;font-family:ui-monospace,monospace;">#4290ED</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;">
    <div style="height:64px;border-radius:12px;background:#1767BE;display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:10px;font-weight:600;">Press</div>
    <div style="font-size:11px;color:#252525;font-weight:500;">primary-press</div>
    <div style="font-size:10px;color:#7C7C7C;font-family:ui-monospace,monospace;">#1767BE</div>
  </div>
</div>
</body></html>
