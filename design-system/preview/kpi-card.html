<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KPI Cards — NST Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../nst-design-system.css">
  <style>
    body {
      background: var(--vw-color-gray-50);
      padding: var(--vw-space-2xl);
      color: var(--vw-color-gray-900);
    }
    .block { margin-bottom: var(--vw-space-2xl); }
    .block-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--vw-color-gray-400);
      margin-bottom: var(--vw-space-md);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--vw-space-md);
      align-items: stretch;
    }
    .kpi-card {
      width: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: var(--vw-space-md);
    }
    .kpi-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .ic { color: var(--vw-color-gray-400); flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="block">
    <div class="block-label">KPI cards (.vw-card-section)</div>
    <div class="row">

      <div class="vw-card-section kpi-card">
        <div class="kpi-header">
          <span class="vw-card-metric-label">Open tickets</span>
          <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        <div class="vw-card-metric-xl">$4.82M</div>
      </div>

      <div class="vw-card-section kpi-card">
        <div class="kpi-header">
          <span class="vw-card-metric-label">Closed this month</span>
          <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>
        <div class="vw-card-metric-xl">127</div>
      </div>

      <div class="vw-card-section kpi-card">
        <div class="kpi-header">
          <span class="vw-card-metric-label">Avg resolution</span>
          <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="vw-card-metric-xl">4.2h</div>
      </div>

      <div class="vw-card-section kpi-card">
        <div class="kpi-header">
          <span class="vw-card-metric-label">SLA compliance</span>
          <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
            <polyline points="17 6 23 6 23 12"/>
          </svg>
        </div>
        <div class="vw-card-metric-xl">94.7%</div>
      </div>

    </div>
  </div>

  <div class="block">
    <div class="block-label">With variance</div>
    <div class="row">
      <div class="vw-card-section kpi-card" style="width: 280px;">
        <div class="vw-card-title">Potential revenue</div>
        <div class="vw-flex vw-justify-between vw-items-baseline vw-gap-sm vw-wrap">
          <div class="vw-card-metric-lg">₹2.5M</div>
          <div class="vw-card-variance is-positive">+12% from last week</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
