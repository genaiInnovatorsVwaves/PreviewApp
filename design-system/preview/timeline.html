<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeline — NST Design System</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F4F4F4;
    font-family: Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 40px;
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ─────────────────────────────────────────────
   TimelineItem
   title: string | Array<{ text: string, bold?: boolean }>
   subtext: string
   isLast: boolean — hides the connecting line
───────────────────────────────────────────── */
const TimelineItem = ({ title, subtext, isLast }) => {
  const renderTitle = (t) => {
    if (typeof t === 'string') return t;
    return t.map((seg, i) => (
      <span key={i} style={{ fontWeight: seg.bold ? 600 : 400 }}>{seg.text}</span>
    ));
  };

  return (
    <div style={{ display: 'flex', gap: 16 }}>

      {/* ── Left: dot + connecting line ── */}
      <div style={{
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        width: 16,
        flexShrink: 0,
      }}>
        {/* Dot: 10px fill + 3px border = 16px total outer */}
        <div style={{
          width: 16,
          height: 16,
          borderRadius: '50%',
          background: '#1C81EF',
          border: '3px solid #EFF6FF',
          boxSizing: 'border-box',
          flexShrink: 0,
          marginTop: 1, /* (18px line-height / 2) - (16px dot / 2) = 1px — aligns dot center with title */
        }}></div>

        {/* Connecting line — starts immediately below the dot, no gap.
            Geometry here is correct by default flex stretch (rail matches
            content height, confirmed via computed layout); the real failure
            mode is contrast, not layout — a thin line in a near-white color
            reads as "disconnected" even when it geometrically isn't. */}
        {!isLast && (
          <div style={{
            width: 2,
            flex: 1,
            background: '#D1D5DB',
            minHeight: 16,
          }}></div>
        )}
      </div>

      {/* ── Right: content ── */}
      <div style={{ flex: 1, paddingBottom: isLast ? 0 : 20 }}>
        <div style={{
          font: '400 12px/18px Inter',
          color: '#111827',
          whiteSpace: 'normal',
        }}>
          {renderTitle(title)}
        </div>
        <div style={{
          font: '400 12px/18px Inter',
          color: '#6B7280',
          marginTop: 2,
        }}>
          {subtext}
        </div>
      </div>

    </div>
  );
};

/* ─────────────────────────────────────────────
   Timeline
   heading: string
   subtext: string
   items: TimelineItem[]
───────────────────────────────────────────── */
const Timeline = ({ heading, subtext, items = [] }) => (
  <div style={{
    background: '#FFFFFF',
    borderRadius: 16,
    border: '1px solid #E9E9E9',
    padding: '16px',
  }}>
    {/* Header */}
    <div style={{ marginBottom: 20 }}>
      <div style={{ font: '500 16px/24px Inter', color: '#111827' }}>{heading}</div>
      {subtext && (
        <div style={{ font: '400 12px/18px Inter', color: '#6B7280', marginTop: 2 }}>{subtext}</div>
      )}
    </div>

    {/* Items */}
    <div>
      {items.map((item, i) => (
        <TimelineItem
          key={i}
          title={item.title}
          subtext={item.subtext}
          isLast={i === items.length - 1}
        />
      ))}
    </div>
  </div>
);

/* ─────────────────────────────────────────────
   Sample data
───────────────────────────────────────────── */
const TITLE_SEGMENTS = [
  { text: 'Site status changed from ', bold: false },
  { text: '\u201cSurvey completed\u201d',  bold: true  },
  { text: ' to ',                          bold: false },
  { text: '\u201cUnder construction\u201d', bold: true  },
];

const SAMPLE_ITEMS = [
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
  { title: TITLE_SEGMENTS, subtext: '2:00 PM, 08 Apr 25' },
];

const App = () => (
  <div style={{ width: 480 }}>
    <Timeline
      heading="Timeline"
      subtext="Major updates and changes made to the site"
      items={SAMPLE_ITEMS}
    />
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
