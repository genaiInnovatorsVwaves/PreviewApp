<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
  body{background:#fff;padding:20px;margin:0;font-family:Inter,system-ui;color:#252525;}
  .chip{display:inline-flex;align-items:center;border-radius:999px;padding:2px 8px;font:500 12px/18px Inter;box-sizing:border-box;}
</style>
</head>
<body>
<div style="display:flex;flex-wrap:wrap;gap:6px;max-width:640px;">
  <span class="chip" style="background:#D1FAE5;color:#047857;">Verified</span>
  <span class="chip" style="background:#D1FAE5;color:#047857;">Submitted</span>
  <span class="chip" style="background:#D1FAE5;color:#047857;">Closed won</span>
  <span class="chip" style="background:#FEE2E2;color:#B91C1C;">Error</span>
  <span class="chip" style="background:#FEE2E2;color:#B91C1C;">Failed</span>
  <span class="chip" style="background:#FEE2E2;color:#B91C1C;">Rejected</span>
  <span class="chip" style="background:#FFEDD5;color:#C2410C;">Yet to start</span>
  <span class="chip" style="background:#FFEDD5;color:#C2410C;">On hold</span>
  <span class="chip" style="background:#FEF9C5;color:#A16207;">Pending</span>
  <span class="chip" style="background:#DBEAFE;color:#1D4EB8;">In progress</span>
  <span class="chip" style="background:#DBEAFE;color:#1D4EB8;">New</span>
  <span class="chip" style="background:#CFFAFE;color:#0E7490;">Active</span>
  <span class="chip" style="background:#F4F4F4;color:#515151;">Draft</span>
  <span class="chip" style="background:#F4F4F4;color:#515151;">Archived</span>
</div>
<div style="margin-top:16px;font:400 11px/16px ui-monospace,monospace;color:#7C7C7C;">padding: 2px 8px &nbsp;·&nbsp; radius: 999px &nbsp;·&nbsp; font: 500 12/18 Inter</div>
</body></html>
