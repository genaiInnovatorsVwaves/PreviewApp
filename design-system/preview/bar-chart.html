<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @font-face { font-family: 'Inter'; src: url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype-variations'); font-weight: 100 900; font-style: normal; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F4F4F4; padding: 24px 28px 28px; font-family: 'Inter', system-ui, sans-serif; color: #252525; -webkit-font-smoothing: antialiased; }
    .block-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 12px; }

    .card {
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 4px 0 rgba(0,0,0,0.06);
      width: 620px;
      max-width: 100%;
    }
    .card-title   { font-size: 18px; font-weight: 700; color: #252525; letter-spacing: -0.01em; margin-bottom: 3px; }
    .card-subtitle{ font-size: 13px; color: #6B7280; margin-bottom: 20px; }
    #bar-chart    { width: 100%; display: block; overflow: visible; }
  </style>
</head>
<body>

  <div class="block-label">Bar chart</div>
  <div class="card">
    <div class="card-title">Tickets by priority</div>
    <div class="card-subtitle">Distribution across all 15 tickets</div>
    <svg id="bar-chart"></svg>
  </div>

  <script>
    const DATA = [
      { label: 'Low',      value: 9200, color: '#A3A3A3' },
      { label: 'Medium',   value: 7900, color: '#3B82F6' },
      { label: 'High',     value: 5100, color: '#FB923C' },
      { label: 'Critical', value: 3300, color: '#EF4444' },
    ];

    const W = 560, H = 280;
    const m = { t: 16, r: 16, b: 36, l: 48 };
    const cW = W - m.l - m.r, cH = H - m.t - m.b;

    const maxV = Math.max(...DATA.map(d => d.value));
    const yMax = Math.ceil(maxV / 3000) * 3000;
    const yTicks = [];
    for (let v = 0; v <= yMax; v += 3000) yTicks.push(v);

    const sy     = v  => cH - (v / yMax) * cH;
    const slotW  = cW / DATA.length;
    const barW   = slotW * 0.56;
    const sx     = i  => i * slotW + slotW / 2;
    const fmtY   = v  => v === 0 ? '0' : `${v / 1000}k`;

    const svgEl = document.getElementById('bar-chart');
    svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

    let inner = `<g transform="translate(${m.l},${m.t})">`;

    // Grid + Y labels
    yTicks.forEach(tick => {
      inner += `<line x1="0" y1="${sy(tick)}" x2="${cW}" y2="${sy(tick)}" stroke="#F3F4F6" stroke-width="1"/>`;
      inner += `<text x="-10" y="${sy(tick) + 4}" text-anchor="end" font-size="12" fill="#9CA3AF" font-family="Inter,sans-serif">${fmtY(tick)}</text>`;
    });

    // Bars + X labels
    DATA.forEach((d, i) => {
      const x = sx(i) - barW / 2;
      const y = sy(d.value);
      const h = cH - y;
      inner += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="8" ry="8" fill="${d.color}"/>`;
      inner += `<text x="${sx(i).toFixed(1)}" y="${cH + 22}" text-anchor="middle" font-size="12" fill="#9CA3AF" font-family="Inter,sans-serif">${d.label}</text>`;
    });

    inner += '</g>';
    svgEl.innerHTML = inner;
  </script>

</body>
</html>
