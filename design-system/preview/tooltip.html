<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Tooltip — NST Design System</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
  .tt-wrap { position: relative; display: inline-block; align-self: flex-start; }
  .tt-box {
    position: absolute; left: 50%; top: calc(100% + 10px); transform: translateX(-50%);
    background: #252525; color: #fff; border-radius: 8px; padding: 12px; width: 260px;
    box-shadow: 0 2px 2px -1px rgba(10,13,18,.04), 0 4px 6px -2px rgba(10,13,18,.03), 0 12px 16px -4px rgba(10,13,18,.08);
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity 120ms ease-out;
  }
  /* Real trigger: hover for mouse, focus-within for keyboard users tabbing to the button */
  .tt-wrap:hover .tt-box,
  .tt-wrap:focus-within .tt-box { opacity: 1; visibility: visible; }
</style>
</head>
<body style="background:#F4F4F4;padding:40px 20px 40px 160px;margin:0;font-family:Inter,system-ui;color:#252525;display:flex;flex-direction:column;gap:12px;">
<div style="font-size:11px;color:#7C7C7C;text-transform:uppercase;letter-spacing:.05em;">Hover or focus the button — the tooltip is hidden until then</div>
<div class="tt-wrap">
  <button style="height:32px;border-radius:8px;padding:6px 8px;background:#F4F4F4;color:#252525;border:1px solid #E9E9E9;font:500 14px/20px Inter;cursor:pointer;">Hover me</button>
  <div class="tt-box">
    <div style="font-size:12px;font-weight:700;line-height:18px;">This is a tooltip</div>
    <div style="font-size:12px;font-weight:500;line-height:18px;margin-top:2px;">Tooltips are used to describe or identify an element.</div>
    <div style="position:absolute;left:50%;top:-6px;transform:translateX(-50%) rotate(45deg);width:12px;height:12px;background:#252525;border-radius:2px;"></div>
  </div>
</div>
</body></html>
