<!DOCTYPE html><html><head><meta charset="utf-8"></head>
<body style="background:#fff;padding:20px;margin:0;font-family:Inter,system-ui;">
<style>.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}.sw{width:48px;height:28px;border-radius:6px;}.name{font-size:12px;color:#252525;font-weight:500;width:110px;}.hex{font-size:10px;color:#7C7C7C;font-family:ui-monospace,monospace;width:80px;}.chip{border-radius:999px;padding:2px 8px;font-size:12px;font-weight:500;line-height:18px;}</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 40px;">
  <div class="row"><div class="sw" style="background:#D1FAE5;"></div><div class="name">success</div><div class="hex">#D1FAE5</div><span class="chip" style="background:#D1FAE5;color:#047857;">Paid</span></div>
  <div class="row"><div class="sw" style="background:#FEE2E2;"></div><div class="name">danger</div><div class="hex">#FEE2E2</div><span class="chip" style="background:#FEE2E2;color:#B91C1C;">Failed</span></div>
  <div class="row"><div class="sw" style="background:#FFEDD5;"></div><div class="name">warn</div><div class="hex">#FFEDD5</div><span class="chip" style="background:#FFEDD5;color:#C2410C;">On hold</span></div>
  <div class="row"><div class="sw" style="background:#FEF9C5;"></div><div class="name">caution</div><div class="hex">#FEF9C5</div><span class="chip" style="background:#FEF9C5;color:#A16207;">Pending</span></div>
  <div class="row"><div class="sw" style="background:#DBEAFE;"></div><div class="name">info</div><div class="hex">#DBEAFE</div><span class="chip" style="background:#DBEAFE;color:#1D4EB8;">In progress</span></div>
  <div class="row"><div class="sw" style="background:#CFFAFE;"></div><div class="name">teal</div><div class="hex">#CFFAFE</div><span class="chip" style="background:#CFFAFE;color:#0E7490;">Active</span></div>
</div>
</body></html>
