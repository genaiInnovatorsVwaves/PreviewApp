<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @font-face { font-family: 'Inter'; src: url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype-variations'); font-weight: 100 900; font-style: normal; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F4F4F4; padding: 24px 28px 28px; font-family: 'Inter', system-ui, sans-serif; color: #252525; -webkit-font-smoothing: antialiased; }
    .block-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 12px; }

    .card {
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 4px 0 rgba(0,0,0,0.06);
      width: 620px;
      max-width: 100%;
    }
    .card-title   { font-size: 18px; font-weight: 700; color: #252525; letter-spacing: -0.01em; margin-bottom: 3px; }
    .card-subtitle{ font-size: 13px; color: #6B7280; margin-bottom: 20px; }
    #line-chart   { width: 100%; display: block; overflow: visible; }

    .legend { display: flex; justify-content: center; gap: 28px; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="block-label">Line chart</div>
  <div class="card">
    <div class="card-title">Tickets by status</div>
    <div class="card-subtitle">Current state across all statuses</div>
    <svg id="line-chart"></svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2563EB"></div>Capacity</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38BDF8"></div>Utilization</div>
    </div>
  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────────────────────
    const SERIES = [
      { name: 'Capacity',    color: '#2563EB', values: [33, 42, 45, 48, 54, 63, 72, 80, 85, 89] },
      { name: 'Utilization', color: '#38BDF8', values: [-8,  7, 10, 14, 18, 26, 37, 46, 51, 57] },
    ];
    const LABELS = ['9 Sep','13 Sep','15 Sep','18 Sep','21 Sep','24 Sep','27 Sep','30 Sep','3 Oct','6 Oct'];

    // ── Layout ────────────────────────────────────────────────────────────────
    const W = 560, H = 300;
    const m = { t: 16, r: 12, b: 58, l: 44 };
    const cW = W - m.l - m.r, cH = H - m.t - m.b;

    const yMin = -20, yMax = 110;
    const yTicks = [0, 25, 50, 75, 100];
    const sy = v => cH - ((v - yMin) / (yMax - yMin)) * cH;
    const sx = i => (i / (LABELS.length - 1)) * cW;

    // ── Smooth bezier helpers ─────────────────────────────────────────────────
    function curveCmds(pts, t) {
      t = t || 0.28;
      let d = '';
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(i-1,0)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(i+2,pts.length-1)];
        const cx1 = p1.x + (p2.x - p0.x)*t, cy1 = p1.y + (p2.y - p0.y)*t;
        const cx2 = p2.x - (p3.x - p1.x)*t, cy2 = p2.y - (p3.y - p1.y)*t;
        d += ' C' + cx1.toFixed(1)+','+cy1.toFixed(1)+' '+cx2.toFixed(1)+','+cy2.toFixed(1)+' '+p2.x.toFixed(1)+','+p2.y.toFixed(1);
      }
      return d;
    }

    function makeLine(pts) {
      return 'M'+pts[0].x.toFixed(1)+','+pts[0].y.toFixed(1) + curveCmds(pts);
    }

    function makeArea(top, bot) {
      const rev = bot.slice().reverse();
      return 'M'+top[0].x.toFixed(1)+','+top[0].y.toFixed(1) + curveCmds(top) +
             ' L'+rev[0].x.toFixed(1)+','+rev[0].y.toFixed(1) + curveCmds(rev) + ' Z';
    }

    // ── Build points ──────────────────────────────────────────────────────────
    const allPts = SERIES.map(s => s.values.map((v, i) => ({ x: sx(i), y: sy(v) })));

    // ── Render ────────────────────────────────────────────────────────────────
    const svgEl = document.getElementById('line-chart');
    svgEl.setAttribute('viewBox', '0 0 '+W+' '+H);

    let inner = '<defs>'
      + '<radialGradient id="areaGrad" cx="58%" cy="50%" r="58%" gradientUnits="objectBoundingBox">'
      +   '<stop offset="0%"   stop-color="#BAE6FD" stop-opacity="0.70"/>'
      +   '<stop offset="100%" stop-color="#BAE6FD" stop-opacity="0"/>'
      + '</radialGradient>'
      + '</defs>';

    inner += '<g transform="translate('+m.l+','+m.t+')">';

    // Grid + Y labels
    yTicks.forEach(function(tick) {
      inner += '<line x1="0" y1="'+sy(tick)+'" x2="'+cW+'" y2="'+sy(tick)+'" stroke="#F3F4F6" stroke-width="1"/>';
      inner += '<text x="-10" y="'+(sy(tick)+4)+'" text-anchor="end" font-size="12" fill="#9CA3AF" font-family="Inter,sans-serif">'+tick+'</text>';
    });

    // Baseline at y=0
    inner += '<line x1="0" y1="'+sy(0)+'" x2="'+cW+'" y2="'+sy(0)+'" stroke="#E9E9E9" stroke-width="1"/>';

    // Area fill
    inner += '<path d="'+makeArea(allPts[0], allPts[1])+'" fill="url(#areaGrad)"/>';

    // Lines
    SERIES.forEach(function(s, si) {
      inner += '<path d="'+makeLine(allPts[si])+'" fill="none" stroke="'+s.color+'" stroke-width="2.5" stroke-linecap="round"/>';
    });

    // Dots
    SERIES.forEach(function(s, si) {
      allPts[si].forEach(function(p) {
        inner += '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="'+s.color+'"/>';
      });
    });

    // X-axis labels (rotated)
    LABELS.forEach(function(lbl, i) {
      const px = sx(i), py = cH + 14;
      inner += '<text x="'+px.toFixed(1)+'" y="'+py+'" text-anchor="end" font-size="11" fill="#9CA3AF" font-family="Inter,sans-serif"'
             + ' transform="rotate(-40,'+px.toFixed(1)+','+py+')">'+lbl+'</text>';
    });

    inner += '</g>';
    svgEl.innerHTML = inner;
  </script>

</body>
</html>
