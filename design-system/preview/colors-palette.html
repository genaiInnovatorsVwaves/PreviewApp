<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="../colors.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Inter,system-ui,sans-serif;background:#fff;padding:20px;-webkit-font-smoothing:antialiased;}
  .section{margin-bottom:20px;}
  .section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:8px;}
  .scale{display:flex;gap:3px;}
  .swatch{flex:1;height:36px;border-radius:4px;cursor:default;position:relative;}
  .swatch:hover::after{content:attr(data-hex);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#111827;color:#fff;font-size:10px;font-family:ui-monospace,monospace;padding:3px 6px;border-radius:4px;white-space:nowrap;z-index:10;}
  .steps{display:flex;gap:3px;margin-top:2px;}
  .step{flex:1;font-size:9px;color:#9ca3af;font-family:ui-monospace,monospace;text-align:center;}
</style>
</head>
<body>

<script>
const palettes = [
  { name: 'Accent (Brand)', prefix: 'accent', steps: ['50','100','200','300','400','500','600','700','800','900'],

  { name: 'Stone', prefix: 'stone', steps: ['50','100','200','300','400','500','600','700','800','900','950'],
    colors: ['#fafaf9','#f5f5f4','#e7e5e4','#d6d3d1','#a8a29e','#78716c','#57534e','#44403c','#292524','#1c1917','#0c0a09'] },
];

let html = '';
palettes.forEach(p => {
  html += `<div class="section"><div class="section-label">${p.name}</div><div class="scale">`;
  p.colors.forEach((c,i) => {
    html += `<div class="swatch" style="background:${c};" data-hex="${c}" title="--vw-color-${p.prefix}-${p.steps[i]} · ${c}"></div>`;
  });
  html += `</div><div class="steps">`;
  p.steps.forEach(s => { html += `<div class="step">${s}</div>`; });
  html += `</div></div>`;
});
document.write(html);
</script>

</body></html>
