<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Inputs — states — NST Design System</title>
<link rel="stylesheet" href="../colors.css">
<link rel="stylesheet" href="../spacing.css">
<link rel="stylesheet" href="../typography-tokens.css">
<link rel="stylesheet" href="../theme-tokens.css">
<link rel="stylesheet" href="../components.css">
<style>
  @font-face { font-family: 'Inter'; src: url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype-variations'); font-weight: 100 900; font-style: normal; font-display: swap; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#fff;padding:24px;-webkit-font-smoothing:antialiased;color:var(--vw-color-gray-900);}

  .label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--vw-color-gray-400);margin-bottom:8px;}
  .group{display:flex;flex-direction:column;gap:16px;max-width:380px;}
  .state-block{display:flex;flex-direction:column;gap:0;}
  .state-name{
    overflow: hidden;
    color: var(--vw-color-gray-500);
    text-overflow: ellipsis;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 500;
    line-height: 18px;
    margin-bottom: 4px;
    white-space: nowrap;
  }

  .cursor { width:1.5px; height:16px; background:var(--vw-color-accent-500); border-radius:1px; animation:blink 1s step-end infinite; display:inline-block; vertical-align:-3px; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* Demo-only: statically pins the :hover/:focus appearance of .nst-input-shell
     so both states can be shown side by side. Not shipped classes — real usage
     relies on the real :hover/:focus-within rules in components.css. */
  .demo-hover        { border-color: var(--vw-color-gray-400); }
  .demo-active,
  .demo-active:focus-within { border-color: var(--vw-color-accent-500); box-shadow: 0 0 0 3px var(--vw-color-accent-100); }
</style>
</head>
<body>

<div class="group">

  <!-- Default -->
  <div class="state-block">
    <div class="state-name">Default</div>
    <div class="nst-input-shell">
      <i class="nst-input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 L13.5 13.5"/></svg></i>
      <input placeholder="Placeholder">
      <i class="nst-input-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 L8 10 L12 6"/></svg></i>
    </div>
  </div>

  <!-- Hover -->
  <div class="state-block">
    <div class="state-name">Hover</div>
    <div class="nst-input-shell demo-hover">
      <i class="nst-input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 L13.5 13.5"/></svg></i>
      <input placeholder="Placeholder">
      <i class="nst-input-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 L8 10 L12 6"/></svg></i>
    </div>
  </div>

  <!-- Active / Focused -->
  <div class="state-block">
    <div class="state-name">Active (focused)</div>
    <div class="nst-input-shell demo-active">
      <i class="nst-input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 L13.5 13.5"/></svg></i>
      <span style="flex:1; font-size:14px; line-height:20px; color: var(--vw-color-gray-700);">Typed value<span class="cursor"></span></span>
      <i class="nst-input-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 L8 10 L12 6"/></svg></i>
    </div>
  </div>

  <!-- Filled -->
  <div class="state-block">
    <div class="state-name">Filled</div>
    <div class="nst-input-shell">
      <i class="nst-input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 L13.5 13.5"/></svg></i>
      <input value="Selected value" readonly>
      <i class="nst-input-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 L8 10 L12 6"/></svg></i>
    </div>
  </div>

  <!-- Error -->
  <div class="state-block">
    <div class="state-name">Error</div>
    <div class="nst-input-shell nst-input--error">
      <i class="nst-input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 L13.5 13.5"/></svg></i>
      <input value="Invalid value" readonly>
      <i class="nst-input-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 L8 10 L12 6"/></svg></i>
    </div>
    <div class="nst-input-hint nst-input-hint--error">This field is required.</div>
  </div>

  <!-- Disabled -->
  <div class="state-block">
    <div class="state-name">Disabled</div>
    <div class="nst-input-shell nst-input--disabled">
      <i class="nst-input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 L13.5 13.5"/></svg></i>
      <input placeholder="Placeholder" disabled>
      <i class="nst-input-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 L8 10 L12 6"/></svg></i>
    </div>
  </div>

</div>

<!-- ── Description Field ── -->
<div style="margin-top:32px;">
  <div class="label">Description field</div>
  <div class="group">

    <!-- Default (interactive) -->
    <div class="state-block">
      <div class="state-name">Default</div>
      <div class="nst-textarea-wrap" id="ta-default">
        <textarea class="nst-textarea" placeholder="Placeholder" maxlength="200"
          oninput="updateCounter(this,'cnt-default',200)"></textarea>
        <div class="nst-textarea-footer">
          <span class="nst-textarea-counter" id="cnt-default">0/200</span>
          <span class="nst-textarea-resize" onmousedown="startResize(event,'ta-default')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 13L13 5M9.5 13L13 9.5"/></svg>
          </span>
        </div>
      </div>
    </div>

    <!-- Hover -->
    <div class="state-block">
      <div class="state-name">Hover</div>
      <div class="nst-textarea-wrap demo-hover">
        <textarea class="nst-textarea" placeholder="Placeholder" style="pointer-events:none;" tabindex="-1"></textarea>
        <div class="nst-textarea-footer">
          <span class="nst-textarea-counter">0/200</span>
          <span class="nst-textarea-resize" style="pointer-events:none;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 13L13 5M9.5 13L13 9.5"/></svg>
          </span>
        </div>
      </div>
    </div>

    <!-- Active / Focused -->
    <div class="state-block">
      <div class="state-name">Active (focused)</div>
      <div class="nst-textarea-wrap demo-active">
        <textarea class="nst-textarea" style="pointer-events:none;color:var(--vw-color-gray-700);" tabindex="-1">Typed value</textarea>
        <div class="nst-textarea-footer">
          <span class="nst-textarea-counter">11/200</span>
          <span class="nst-textarea-resize" style="pointer-events:none;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 13L13 5M9.5 13L13 9.5"/></svg>
          </span>
        </div>
      </div>
    </div>

    <!-- Filled -->
    <div class="state-block">
      <div class="state-name">Filled</div>
      <div class="nst-textarea-wrap">
        <textarea class="nst-textarea" style="pointer-events:none;color:var(--vw-color-gray-700);" tabindex="-1">This is the filled content of the description field.</textarea>
        <div class="nst-textarea-footer">
          <span class="nst-textarea-counter">51/200</span>
          <span class="nst-textarea-resize" style="pointer-events:none;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 13L13 5M9.5 13L13 9.5"/></svg>
          </span>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="state-block">
      <div class="state-name">Error</div>
      <div class="nst-textarea-wrap nst-textarea--error">
        <textarea class="nst-textarea" style="pointer-events:none;color:var(--vw-color-gray-700);" tabindex="-1">Invalid content entered here</textarea>
        <div class="nst-textarea-footer">
          <span class="nst-textarea-counter">26/200</span>
          <span class="nst-textarea-resize" style="pointer-events:none;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 13L13 5M9.5 13L13 9.5"/></svg>
          </span>
        </div>
      </div>
      <div class="nst-input-hint nst-input-hint--error">This field contains invalid content.</div>
    </div>

    <!-- Disabled -->
    <div class="state-block">
      <div class="state-name">Disabled</div>
      <div class="nst-textarea-wrap nst-textarea--disabled">
        <textarea class="nst-textarea" placeholder="Placeholder" disabled></textarea>
        <div class="nst-textarea-footer">
          <span class="nst-textarea-counter">0/200</span>
          <span class="nst-textarea-resize">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 13L13 5M9.5 13L13 9.5"/></svg>
          </span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function updateCounter(ta, id, max) {
  const len = ta.value.length;
  const el = document.getElementById(id);
  el.textContent = len + '/' + max;
  el.classList.toggle('nst-textarea-counter--over', len >= max);
}
function startResize(e, id) {
  e.preventDefault();
  const wrap = document.getElementById(id);
  const startY = e.clientY;
  const startH = wrap.offsetHeight;
  function onMove(ev) { wrap.style.height = Math.max(80, startH + ev.clientY - startY) + 'px'; }
  function onUp()     { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}
</script>
</body></html>
