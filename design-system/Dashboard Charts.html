<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NST Dashboard Charts</title>
  <style>
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype-variations');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, sans-serif;
      background: #F4F4F4;
      color: #252525;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .page { max-width: 1200px; margin: 0 auto; padding: 40px 32px 80px; }
    .sec-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: #A8A8A8; margin-bottom: 12px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 1000px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 540px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .page { padding: 24px 16px 60px; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── SVG path utilities ─────────────────────────────────────────────────────

    function curveCmds(pts, t = 0.28) {
      let d = '';
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(i - 1, 0)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(i + 2, pts.length - 1)];
        const cx1 = p1.x + (p2.x - p0.x) * t;
        const cy1 = p1.y + (p2.y - p0.y) * t;
        const cx2 = p2.x - (p3.x - p1.x) * t;
        const cy2 = p2.y - (p3.y - p1.y) * t;
        d += ` C${cx1.toFixed(1)},${cy1.toFixed(1)} ${cx2.toFixed(1)},${cy2.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
      }
      return d;
    }

    const makeLine = pts => `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}` + curveCmds(pts);

    function makeArea(top, bot) {
      const rev = [...bot].reverse();
      return `M${top[0].x.toFixed(1)},${top[0].y.toFixed(1)}` + curveCmds(top) +
             ` L${rev[0].x.toFixed(1)},${rev[0].y.toFixed(1)}` + curveCmds(rev) + ' Z';
    }

    // (roundedBar removed — bars now use <rect rx> for full rounding)

    // ── Inline SVG icons ───────────────────────────────────────────────────────

    const iconProps = { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: '#A8A8A8', strokeWidth: '1.8', strokeLinecap: 'round', strokeLinejoin: 'round' };

    const WrenchIcon = () => (
      <svg {...iconProps}>
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
      </svg>
    );

    const CheckIcon = () => (
      <svg {...iconProps}>
        <path d="M20 6L9 17l-5-5" />
      </svg>
    );

    const ClockIcon = () => (
      <svg {...iconProps}>
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    );

    const TrendIcon = () => (
      <svg {...iconProps}>
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
        <polyline points="17 6 23 6 23 12" />
      </svg>
    );

    const ICONS = { wrench: WrenchIcon, check: CheckIcon, clock: ClockIcon, trend: TrendIcon };

    // ── KPI Card ───────────────────────────────────────────────────────────────

    function KPICard({ label, value, icon = 'wrench', radius }) {
      const Icon = ICONS[icon] || WrenchIcon;
      return (
        <div style={{
          background: '#FFFFFF',
          border: '1px solid #E9E9E9',
          borderRadius: radius,
          padding: '18px 20px 22px',
          boxShadow: '0 2px 4px 0 rgba(0,0,0,0.06)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
            <span style={{ fontSize: 14, color: '#6B7280', fontWeight: 400, lineHeight: '20px' }}>{label}</span>
            <Icon />
          </div>
          <div style={{ fontSize: 34, fontWeight: 300, color: '#252525', letterSpacing: '-0.025em', lineHeight: 1, fontFamily: 'Inter, sans-serif' }}>
            {value}
          </div>
        </div>
      );
    }

    // ── Bar Chart ──────────────────────────────────────────────────────────────

    function BarChart({ title, subtitle, data, radius }) {
      const [hovered, setHovered] = useState(null);

      const W = 480, H = 280;
      const m = { t: 16, r: 12, b: 36, l: 48 };
      const cW = W - m.l - m.r;
      const cH = H - m.t - m.b;

      const maxV  = Math.max(...data.map(d => d.value));
      const yMax  = Math.ceil(maxV / 3000) * 3000;
      const yTicks = [];
      for (let v = 0; v <= yMax; v += 3000) yTicks.push(v);

      const sy    = v => cH - (v / yMax) * cH;
      const slotW = cW / data.length;
      const barW  = slotW * 0.56;
      const sx    = i => i * slotW + slotW / 2;
      const fmtY  = v => v === 0 ? '0' : `${v / 1000}k`;

      return (
        <div style={{ background: '#FFF', border: '1px solid #E9E9E9', borderRadius: radius, padding: 24, boxShadow: '0 2px 4px 0 rgba(0,0,0,0.06)' }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#252525', marginBottom: 3, letterSpacing: '-0.01em' }}>{title}</div>
            <div style={{ fontSize: 13, color: '#6B7280' }}>{subtitle}</div>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block', overflow: 'visible' }}>
            <g transform={`translate(${m.l},${m.t})`}>

              {/* Horizontal grid lines + Y-axis labels */}
              {yTicks.map(tick => (
                <g key={tick}>
                  <line x1={0} y1={sy(tick)} x2={cW} y2={sy(tick)} stroke="#F3F4F6" strokeWidth={1} />
                  <text x={-10} y={sy(tick) + 4} textAnchor="end" fontSize={12} fill="#9CA3AF" fontFamily="Inter, sans-serif">
                    {fmtY(tick)}
                  </text>
                </g>
              ))}

              {/* Bars */}
              {data.map((d, i) => {
                const x = sx(i) - barW / 2;
                const y = sy(d.value);
                const h = cH - y;
                const isHov = hovered === i;
                const dimmed = hovered !== null && !isHov;
                return (
                  <g key={d.label}
                    onMouseEnter={() => setHovered(i)}
                    onMouseLeave={() => setHovered(null)}
                    style={{ cursor: 'pointer' }}
                  >
                    <rect
                      x={x} y={y} width={barW} height={h}
                      rx={8} ry={8}
                      fill={d.color}
                      style={{ opacity: dimmed ? 0.35 : 1, transition: 'opacity 150ms ease' }}
                    />
                    {/* Tooltip */}
                    {isHov && (
                      <g>
                        <rect x={sx(i) - 24} y={y - 31} width={48} height={22} rx={6} fill="#252525" />
                        <text x={sx(i)} y={y - 16} textAnchor="middle" fill="#FFFFFF" fontSize={11} fontWeight={600} fontFamily="Inter, sans-serif">
                          {d.value >= 1000 ? `${(d.value / 1000).toFixed(1)}k` : d.value}
                        </text>
                      </g>
                    )}
                  </g>
                );
              })}

              {/* X-axis labels */}
              {data.map((d, i) => (
                <text key={d.label} x={sx(i)} y={cH + 22} textAnchor="middle" fontSize={12} fill="#9CA3AF" fontFamily="Inter, sans-serif">
                  {d.label}
                </text>
              ))}

            </g>
          </svg>
        </div>
      );
    }

    // ── Line Chart ─────────────────────────────────────────────────────────────

    function LineChart({ title, subtitle, series, labels, showFill, radius }) {
      const [hov, setHov] = useState(null);

      const W = 480, H = 300;
      const m = { t: 16, r: 12, b: 58, l: 44 };
      const cW = W - m.l - m.r;
      const cH = H - m.t - m.b;

      // Y range includes negative territory for the Utilization line
      const yMin   = -20;
      const yMax   = 110;
      const yTicks = [0, 25, 50, 75, 100];
      const sy     = v => cH - ((v - yMin) / (yMax - yMin)) * cH;
      const sx     = i => (i / (labels.length - 1)) * cW;

      const allPts = series.map(s => s.values.map((v, i) => ({ x: sx(i), y: sy(v) })));

      return (
        <div style={{ background: '#FFF', border: '1px solid #E9E9E9', borderRadius: radius, padding: 24, boxShadow: '0 2px 4px 0 rgba(0,0,0,0.06)' }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#252525', marginBottom: 3, letterSpacing: '-0.01em' }}>{title}</div>
            <div style={{ fontSize: 13, color: '#6B7280' }}>{subtitle}</div>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block', overflow: 'visible' }}>
            <defs>
              <radialGradient id="areaGrad" cx="58%" cy="50%" r="58%" gradientUnits="objectBoundingBox">
                <stop offset="0%"   stopColor="#BAE6FD" stopOpacity="0.70" />
                <stop offset="100%" stopColor="#BAE6FD" stopOpacity="0" />
              </radialGradient>
            </defs>

            <g transform={`translate(${m.l},${m.t})`}>

              {/* Horizontal grid lines + Y labels */}
              {yTicks.map(tick => (
                <g key={tick}>
                  <line x1={0} y1={sy(tick)} x2={cW} y2={sy(tick)} stroke="#F3F4F6" strokeWidth={1} />
                  <text x={-10} y={sy(tick) + 4} textAnchor="end" fontSize={12} fill="#9CA3AF" fontFamily="Inter, sans-serif">
                    {tick}
                  </text>
                </g>
              ))}

              {/* Baseline at y=0 */}
              <line x1={0} y1={sy(0)} x2={cW} y2={sy(0)} stroke="#E9E9E9" strokeWidth={1} />

              {/* Area fill between the two series */}
              {showFill && (
                <path d={makeArea(allPts[0], allPts[1])} fill="url(#areaGrad)" />
              )}

              {/* Lines */}
              {series.map((s, si) => (
                <path
                  key={s.name}
                  d={makeLine(allPts[si])}
                  fill="none"
                  stroke={s.color}
                  strokeWidth={2.5}
                  strokeLinecap="round"
                />
              ))}

              {/* Dots + hit areas */}
              {series.map((s, si) =>
                allPts[si].map((p, pi) => {
                  const isHov = hov?.si === si && hov?.pi === pi;
                  return (
                    <circle
                      key={`${si}-${pi}`}
                      cx={p.x} cy={p.y}
                      r={isHov ? 5.5 : 4}
                      fill={s.color}
                      style={{ cursor: 'pointer', transition: 'r 100ms' }}
                      onMouseEnter={() => setHov({ si, pi, x: p.x, y: p.y, v: s.values[pi], name: s.name })}
                      onMouseLeave={() => setHov(null)}
                    />
                  );
                })
              )}

              {/* Dot tooltip */}
              {hov && (() => {
                const label = `${hov.name}: ${hov.v}`;
                const tipW  = label.length * 6.2 + 16;
                const tx    = Math.max(0, Math.min(hov.x - tipW / 2, cW - tipW));
                const ty    = hov.y - 34;
                return (
                  <g pointerEvents="none">
                    <rect x={tx} y={ty} width={tipW} height={22} rx={6} fill="#252525" />
                    <text x={tx + tipW / 2} y={ty + 15} textAnchor="middle" fill="#FFF" fontSize={11} fontWeight={600} fontFamily="Inter, sans-serif">
                      {label}
                    </text>
                  </g>
                );
              })()}

              {/* X-axis labels — rotated */}
              {labels.map((lbl, i) => (
                <text
                  key={lbl + i}
                  x={sx(i)} y={cH + 14}
                  textAnchor="end"
                  fontSize={11}
                  fill="#9CA3AF"
                  fontFamily="Inter, sans-serif"
                  transform={`rotate(-40,${sx(i)},${cH + 14})`}
                >
                  {lbl}
                </text>
              ))}

            </g>
          </svg>

          {/* Legend */}
          <div style={{ display: 'flex', justifyContent: 'center', gap: 28, marginTop: 6 }}>
            {series.map(s => (
              <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#374151' }}>
                <div style={{ width: 10, height: 10, borderRadius: '50%', background: s.color, flexShrink: 0 }} />
                {s.name}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Data ───────────────────────────────────────────────────────────────────

    const BAR_THEMES = {
      priority: ['#A3A3A3', '#3B82F6', '#FB923C', '#EF4444'],
      mono:     ['#D1D5DB', '#9CA3AF', '#6B7280', '#374151'],
      brand:    ['#93C5FD', '#3B82F6', '#1D4ED8', '#1E3A8A'],
    };

    const BAR_LABELS = ['Low', 'Medium', 'High', 'Critical'];
    const BAR_VALUES = [9200, 7900, 5100, 3300];

    const LINE_SERIES = [
      { name: 'Capacity',    color: '#2563EB', values: [33, 42, 45, 48, 54, 63, 72, 80, 85, 89] },
      { name: 'Utilization', color: '#38BDF8', values: [-8,  7, 10, 14, 18, 26, 37, 46, 51, 57] },
    ];

    const LINE_LABELS = ['9 Sep','13 Sep','15 Sep','18 Sep','21 Sep','24 Sep','27 Sep','30 Sep','3 Oct','6 Oct'];

    const KPI_DATA = [
      { label: 'Open tickets',      value: '$4.82M', icon: 'wrench' },
      { label: 'Closed this month', value: '127',    icon: 'check'  },
      { label: 'Avg resolution',    value: '4.2h',   icon: 'clock'  },
      { label: 'SLA compliance',    value: '94.7%',  icon: 'trend'  },
    ];

    // ── Tweakable defaults ─────────────────────────────────────────────────────

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "barTheme": "priority",
      "showFill": true,
      "cardRadius": 16
    }/*EDITMODE-END*/;

    // ── App ────────────────────────────────────────────────────────────────────

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const barData = BAR_LABELS.map((lbl, i) => ({
        label: lbl,
        value: BAR_VALUES[i],
        color: (BAR_THEMES[t.barTheme] ?? BAR_THEMES.priority)[i],
      }));

      return (
        <>
          <div className="page">

            <div style={{ marginBottom: 28 }}>
              <div className="sec-label">KPI Cards</div>
              <div className="kpi-grid">
                {KPI_DATA.map(c => (
                  <KPICard key={c.label} {...c} radius={t.cardRadius} />
                ))}
              </div>
            </div>

            <div className="sec-label">Charts</div>
            <div className="chart-grid">
              <BarChart
                title="Tickets by priority"
                subtitle="Distribution across all 15 tickets"
                data={barData}
                radius={t.cardRadius}
              />
              <LineChart
                title="Tickets by status"
                subtitle="Current state across all statuses"
                series={LINE_SERIES}
                labels={LINE_LABELS}
                showFill={t.showFill}
                radius={t.cardRadius}
              />
            </div>

          </div>

          <TweaksPanel>
            <TweakSection label="Bar chart" />
            <TweakRadio
              label="Color theme"
              value={t.barTheme}
              options={['priority', 'mono', 'brand']}
              onChange={v => setTweak('barTheme', v)}
            />
            <TweakSection label="Line chart" />
            <TweakToggle
              label="Area fill"
              value={t.showFill}
              onChange={v => setTweak('showFill', v)}
            />
            <TweakSection label="Cards" />
            <TweakSlider
              label="Corner radius"
              value={t.cardRadius}
              min={4} max={24} step={2} unit="px"
              onChange={v => setTweak('cardRadius', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
